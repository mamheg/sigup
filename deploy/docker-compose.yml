name: sigup

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: sigup
      POSTGRES_USER: sigup
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sigup -d sigup"]
      interval: 5s
      timeout: 3s
      retries: 12

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
      network: host
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://sigup:${POSTGRES_PASSWORD}@db:5432/sigup
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?set ADMIN_EMAIL in .env}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      SITE_URL: ${SITE_URL:-http://localhost}
    volumes:
      - uploads:/app/static/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  web:
    build:
      context: ..
      dockerfile: Dockerfile.frontend
      network: host
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - uploads:/srv/uploads:ro
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
